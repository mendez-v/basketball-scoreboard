<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">

  <link rel="icon" href="./assets/img/favicon.png">
  <link rel="apple-touch-icon" href="./assets/img/favicon.png">

  <title>Basketball Scoreboard</title>
  <meta name="title" content="Basketball Scoreboard" />
  <meta name="description" content="This is a solution for the project: 'Basketball Scoreboard' of the 'Learn JavaScript' course by Scrimba." />

  <meta property="og:url" content="https://vanmendez.github.io/basketball-scoreboard/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Basketball Scoreboard">
  <meta property="og:description" content="This is a solution for the project: 'Basketball Scoreboard' of the 'Learn JavaScript' course by Scrimba." />
  <meta property="og:image" content="https://raw.githubusercontent.com/vanmendez/basketball-scoreboard/main/assets/img/thumbnail.png" />

  <meta name="twitter:card" content="summary_large_image">
  <meta property="twitter:domain" content="vanmendez.github.io">
  <meta property="twitter:url" content="https://vanmendez.github.io/basketball-scoreboard/">
  <meta name="twitter:title" content="Basketball Scoreboard">
  <meta name="twitter:description" content="This is a solution for the project: 'Basketball Scoreboard' of the 'Learn JavaScript' course by Scrimba." />
  <meta name="twitter:image" content="https://raw.githubusercontent.com/vanmendez/basketball-scoreboard/main/assets/img/thumbnail.png" />

  <link rel="stylesheet" href="./styles.css">
  <script src="./main.js" defer></script>

</head>
<body>
  <main>
    <form id="scoreboard" action="#" class="scoreboard">
      <div class="team">
        <h2 class="team__title">home</h2>
        <input id="home-score" class="team-score" type="text" readonly>
      </div>
      <div class="team">
        <h2 class="team__title">guest</h2>
        <input id="guest-score" class="team-score" type="text" readonly>
      </div>
      <div class="container-points">
        <div class="wrapper-points">
          <button class="point" onclick="add1home()">+1</button>
          <button class="point" onclick="add2home()">+2</button>
          <button class="point" onclick="add3home()">+3</button>
        </div>
        <div class="wrapper-points">
          <button class="point" onclick="add1guest()">+1</button>
          <button class="point" onclick="add2guest()">+2</button>
          <button class="point" onclick="add3guest()">+3</button>
        </div>
        <div class="cleanPoints">
          <button type="reset" class="point reset--point" onclick="clean()">reset</button>
        </div>
      </div>
    </form>
  </main>

  <footer class="footer">
    <small class="attr">Practice by <a href="https://scrimba.com/" class="attr-link" target="_blank" rel="noreferrer">Scrimba</a> - Coded by <a href="https://github.com/vanmendez/basketBasball-scoreboard" class="attr-link" target="_blank" rel="noreferrer">vimp</a> 😉</small>
  </footer>
</body>
</html>
