<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./assets/img/favicon.png">
  <link rel="apple-touch-icon" href="./assets/img/favicon.png">
  <title>Basketball Scoreboard</title>

  <link rel="stylesheet" href="./styles.css">
  <script src="./main.js" defer></script>

</head>
<body>
  <main>
    <form id="scoreboard" action="#" class="scoreboard">
      <div class="team">
        <h2 class="team__title">home</h2>
        <input id="home-score" class="team-score" type="text" readonly>
      </div>
      <div class="team">
        <h2 class="team__title">guest</h2>
        <input id="guest-score" class="team-score" type="text" readonly>
      </div>
      <div class="container-points">
        <div class="wrapper-points">
          <button class="point" onclick="add1home()">+1</button>
          <button class="point" onclick="add2home()">+2</button>
          <button class="point" onclick="add3home()">+3</button>
        </div>
        <div class="wrapper-points">
          <button class="point" onclick="add1guest()">+1</button>
          <button class="point" onclick="add2guest()">+2</button>
          <button class="point" onclick="add3guest()">+3</button>
        </div>
        <div class="cleanPoints">
          <button type="reset" class="point reset--point" onclick="clean()">reset</button>
        </div>
      </div>
    </form>
  </main>

  <footer class="footer">
    <small class="attr">Practice by <a href="https://scrimba.com/" class="attr-link" target="_blank" rel="noreferrer">Scrimba</a> - Coded by <a href="https://github.com/vanmendez/basketball-scoreboard" class="attr-link" target="_blank" rel="noreferrer">vimp</a> 😉</small>
  </footer>
</body>
</html>
